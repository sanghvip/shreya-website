<!DOCTYPE html>
<html lang="en">
<head>

    <link rel="stylesheet" href="logo.css">

<body>

    <!-- 1. Primary Lockup (Light Background) -->
    <div class="container">
        <p class="label">Primary Lockup (Light)</p>
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 150">
            <!-- Mark -->
            <g transform="translate(20, 25)">
                <circle cx="50" cy="50" r="48" fill="none" stroke="#3A5244" stroke-width="2.5"/>
                <!-- 11 Spokes -->
                <g stroke="#3A5244" stroke-width="1.5">
                    <line x1="50" y1="2" x2="50" y2="10" transform="rotate(0 50 50)"/><line x1="50" y1="2" x2="50" y2="10" transform="rotate(32.7 50 50)"/><line x1="50" y1="2" x2="50" y2="10" transform="rotate(65.4 50 50)"/><line x1="50" y1="2" x2="50" y2="10" transform="rotate(98.1 50 50)"/><line x1="50" y1="2" x2="50" y2="10" transform="rotate(130.9 50 50)"/><line x1="50" y1="2" x2="50" y2="10" transform="rotate(163.6 50 50)"/><line x1="50" y1="2" x2="50" y2="10" transform="rotate(196.3 50 50)"/><line x1="50" y1="2" x2="50" y2="10" transform="rotate(229 50 50)"/><line x1="50" y1="2" x2="50" y2="10" transform="rotate(261.8 50 50)"/><line x1="50" y1="2" x2="50" y2="10" transform="rotate(294.5 50 50)"/><line x1="50" y1="2" x2="50" y2="10" transform="rotate(327.2 50 50)"/>
                </g>
                <!-- Brain Detail -->
                <path d="M50 30 c-8 0-12 5-12 10 c0 3 2 6 5 8 c-3 2-4 5-4 8 c0 5 4 9 11 9 s11-4 11-9 c0-3-1-6-4-8 c3-2 5-5 5-8 C62 35 58 30 50 30z" fill="none" stroke="#C9A961" stroke-width="0.8" opacity="0.7"/>
                <!-- FBT Triangle -->
                <path d="M50 25 L72 65 L28 65 Z" fill="none" stroke="#C9A961" stroke-width="1"/>
                <circle cx="50" cy="25" r="3" fill="#C9A961"/><circle cx="72" cy="65" r="3" fill="#C9A961"/><circle cx="28" cy="65" r="3" fill="#C9A961"/>
                <!-- Sage Arc -->
                <path d="M25 82 Q50 95 75 82" fill="none" stroke="#8B9C7F" stroke-width="4" stroke-linecap="round"/>
            </g>
            <!-- Wordmark -->
            <text x="140" y="75" font-family="Serif" font-size="42" fill="#3A5244" letter-spacing="4">SHREYA SANGHVI</text>
            <line x1="140" y1="92" x2="560" y2="92" stroke="#C9A961" stroke-width="1"/>
            <text x="140" y="115" font-family="sans-serif" font-size="12" fill="#666666" letter-spacing="5">COUNSELLING · NLP · FBT · CANADA</text>
        </svg>
    </div>

    <!-- 2. Primary Lockup (Dark Background) -->

                <g transform="translate(20, 25)">
                    <circle cx="50" cy="50" r="48" fill="none" stroke="#FBF9F6" stroke-width="2.5"/>
                    <g stroke="#FBF9F6" stroke-width="1.5">
                        <line x1="50" y1="2" x2="50" y2="10" transform="rotate(0 50 50)"/><line x1="50" y1="2" x2="50" y2="10" transform="rotate(32.7 50 50)"/><line x1="50" y1="2" x2="50" y2="10" transform="rotate(327.2 50 50)"/>

                    <path d="M50 30 c-8 0-12 5-12 10 c0 3 2 6 5 8 c-3 2-4 5-4 8 c0 5 4 9 11 9 s11-4 11-9 c0-3-1-6-4-8 c3-2 5-5 5-8 C62 35 58 30 50 30z" fill="none" stroke="#C9A961" stroke-width="0.8"/>
                    <path d="M50 25 L72 65 L28 65 Z" fill="none" stroke="#C9A961" stroke-width="1"/>

                    <path d="M25 82 Q50 95 75 82" fill="none" stroke="#8B9C7F" stroke-width="4" stroke-linecap="round"/>
                </g>
                <text x="140" y="75" font-family="Serif" font-size="42" fill="#FBF9F6" letter-spacing="4">SHREYA SANGHVI</text>
                <line x1="140" y1="92" x2="560" y2="92" stroke="#C9A961" stroke-width="1"/>
                <text x="140" y="115" font-family="sans-serif" font-size="12" fill="#8B9C7F" letter-spacing="5">COUNSELLING · NLP · FBT · CANADA</text>
            </svg>

    </div>

    <!-- 3. Icon Mark (Square) -->
    <div class="container icon-container">
        <p class="label">Icon Mark Only</p>
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
            <circle cx="50" cy="50" r="48" fill="none" stroke="#3A5244" stroke-width="3"/>
            <g stroke="#3A5244" stroke-width="2">
                <line x1="50" y1="2" x2="50" y2="12" transform="rotate(0 50 50)"/><line x1="50" y1="2" x2="50" y2="10" transform="rotate(32.7 50 50)"/><line x1="50" y1="2" x2="50" y2="10" transform="rotate(65.4 50 50)"/><line x1="50" y1="2" x2="50" y2="10" transform="rotate(98.1 50 50)"/><line x1="50" y1="2" x2="50" y2="10" transform="rotate(130.9 50 50)"/><line x1="50" y1="2" x2="50" y2="10" transform="rotate(163.6 50 50)"/><line x1="50" y1="2" x2="50" y2="10" transform="rotate(196.3 50 50)"/><line x1="50" y1="2" x2="50" y2="10" transform="rotate(229 50 50)"/><line x1="50" y1="2" x2="50" y2="10" transform="rotate(261.8 50 50)"/><line x1="50" y1="2" x2="50" y2="10" transform="rotate(294.5 50 50)"/><line x1="50" y1="2" x2="50" y2="10" transform="rotate(327.2 50 50)"/>
            </g>
            <path d="M50 25 L72 65 L28 65 Z" fill="none" stroke="#C9A961" stroke-width="1.5"/>
            <circle cx="50" cy="25" r="3.5" fill="#C9A961"/><circle cx="72" cy="65" r="3.5" fill="#C9A961"/><circle cx="28" cy="65" r="3.5" fill="#C9A961"/>

    <!-- 4. Wordmark Only -->
    <div class="container">
        <p class="label">Wordmark Only</p>
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 100">
            <text x="50%" y="45" text-anchor="middle" font-family="Serif" font-size="42" fill="#3A5244" letter-spacing="4">SHREYA SANGHVI</text>
            <line x1="50" y1="62" x2="450" y2="62" stroke="#C9A961" stroke-width="1"/>
            <text x="50%" y="85" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#666666" letter-spacing="5">COUNSELLING · NLP · FBT · CANADA</text>
        </svg>
    </div>

</body>
</html>
